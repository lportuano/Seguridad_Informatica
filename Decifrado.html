<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descifrado de Información</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

    <div class="container-app">
        <a href="Index.html" class="back-link">← Volver al Inicio</a>
        <h1>🔓 Módulo de Descifrado</h1>
        <hr>

        <div class="card">
            <h2>🔓 Descifrar Archivo (AES)</h2>
            <p class="description">Sube tu archivo .enc y pon la clave correcta para restaurarlo.</p>
            
            <div style="text-align: center; margin-bottom: 20px;">
                <button type="button" class="btn-select" onclick="document.getElementById('file-to-decrypt').click()">
                    📁 Seleccionar Archivo Cifrado (.enc)...
                </button>
                <input type="file" id="file-to-decrypt" style="display: none;" onchange="actualizarNombreDescifrar()">
                <p id="file-name-decrypt" class="file-status">Ningún archivo seleccionado</p>
            </div>

            <input type="text" id="aes-key-input" placeholder="Introduce la misma clave secreta">
            <button onclick="descifrarArchivoAES()">Descifrar y Restaurar Archivo</button>
        </div>
    </div>

    <script src="Scrip.js"></script>
</body>
</html>
